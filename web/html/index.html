<!DOCTYPE html>
<html class="no-js" lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Tenant Panel</title>

    <!-- Bootstrap 3 -->
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css">
    <!-- Font Awesome 4 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <!-- uAdmin CSS -->
    <link rel="stylesheet" href="/assets/css/plugins.css">
    <link rel="stylesheet" href="/assets/css/main.css">

    <style>
        /* ---- Plan / status tags (kept from original) ---- */
        .plan-tag {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 12px;
            font-weight: 500;
        }
        .plan-free     { background: #f5f5f5;   color: #595959; border: 1px solid #d9d9d9; }
        .plan-pro      { background: #e6f4ff;   color: #1890ff; border: 1px solid #91caff; }
        .plan-gold     { background: #fffbe6;   color: #d48806; border: 1px solid #ffe58f; }
        .plan-enterprise { background: #f9f0ff; color: #722ed1; border: 1px solid #d3adf7; }

        .status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 5px; }
        .dot-green { background: #52c41a; }
        .dot-gray  { background: #bfbfbf; }

        /* ---- Stat badges ---- */
        .stat-badge {
            display: inline-flex; align-items: center; justify-content: center;
            background: #f0f0f0; color: #595959;
            border-radius: 10px; padding: 1px 8px; font-size: 12px; font-weight: 600;
        }
        .stat-badge.blue   { background: #e6f4ff; color: #1890ff; }
        .stat-badge.green  { background: #f6ffed; color: #52c41a; }
        .stat-badge.orange { background: #fff7e6; color: #fa8c16; }
        .stat-badge.red    { background: #fff1f0; color: #f5222d; }
        .stat-badge.purple { background: #f9f0ff; color: #722ed1; }

        /* ---- Stats bar ---- */
        .page-stats-bar {
            background: #fff;
            border: 1px solid #e8e8e8;
            border-radius: 4px;
            padding: 10px 16px;
            display: flex; align-items: center; gap: 20px;
            margin-bottom: 14px;
            flex-wrap: wrap;
        }
        .stat-item { display: flex; align-items: center; gap: 5px; font-size: 13px; color: #595959; }
        .stat-value { font-weight: 600; color: #1890ff; }

        /* ---- Mini progress bar ---- */
        .mini-progress { height: 4px; background: #f0f0f0; border-radius: 2px; margin-top: 3px; overflow: hidden; }
        .mini-progress-bar { height: 100%; border-radius: 2px; background: #1890ff; transition: width 0.3s; }
        .mini-progress-bar.warn { background: #fa8c16; }

        /* ---- Toolbar ---- */
        .toolbar {
            display: flex; align-items: center; gap: 8px;
            margin-bottom: 12px; flex-wrap: wrap;
        }
        .toolbar-right { margin-left: auto; display: flex; gap: 8px; align-items: center; }

        /* ---- Notification toast area ---- */
        #toast-container {
            position: fixed; top: 60px; right: 20px; z-index: 9999;
            display: flex; flex-direction: column; gap: 8px;
            pointer-events: none;
        }
        .toast-msg {
            padding: 10px 18px; border-radius: 4px; font-size: 13px; color: #fff;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2); pointer-events: auto;
            opacity: 1; transition: opacity 0.4s;
        }
        .toast-msg.success { background: #52c41a; }
        .toast-msg.error   { background: #f5222d; }
        .toast-msg.warning { background: #fa8c16; }
        .toast-msg.info    { background: #1890ff; }

        /* ---- Active sidebar link ---- */
        #primary-nav li a.router-active {
            padding-left: 35px;
            color: #333;
            background-color: #fff;
            border-left: 5px solid #db4a39;
        }
        #primary-nav li a.router-active i { color: #555; }

        /* ---- Page content min-height adjustment ---- */
        #page-content { min-height: calc(100vh - 80px); }

        /* ---- New API key alert ---- */
        .api-key-alert {
            background: #f6ffed; border: 1px solid #b7eb8f;
            border-radius: 4px; padding: 10px 14px;
            margin-bottom: 14px; display: flex; align-items: flex-start; gap: 10px;
        }
    </style>
</head>
<body>
    <!-- Toast notification container -->
    <div id="toast-container"></div>

    <!-- Vue app root -->
    <div id="app">
        <!-- Page Container -->
        <div id="page-container">

            <!-- Header / Navbar -->
            <header class="navbar navbar-inverse">
                <!-- Mobile toggle -->
                <ul class="navbar-nav-custom pull-right hidden-md hidden-lg">
                    <li class="divider-vertical"></li>
                    <li>
                        <a href="javascript:void(0)" data-toggle="collapse" data-target=".navbar-main-collapse">
                            <i class="fa fa-bars"></i>
                        </a>
                    </li>
                </ul>

                <!-- Brand -->
                <a href="javascript:void(0)" class="navbar-brand" @click="go('dashboard')" style="font-size:16px;font-weight:700;letter-spacing:.5px;">
                    <i class="fa fa-server" style="margin-right:6px;"></i>Tenant Panel
                </a>

                <!-- Right nav widgets -->
                <ul id="widgets" class="navbar-nav-custom pull-right">
                    <li class="divider-vertical"></li>
                    <!-- Sign Out -->
                    <li>
                        <a href="javascript:void(0)" @click="logout" title="Sign Out">
                            <i class="fa fa-sign-out"></i> <span class="hidden-xs hidden-sm">Sign Out</span>
                        </a>
                    </li>
                    <li class="divider-vertical"></li>
                </ul>
            </header>
            <!-- END Header -->

            <!-- Inner Container -->
            <div id="inner-container">

                <!-- Sidebar -->
                <aside id="page-sidebar" class="collapse navbar-collapse navbar-main-collapse">
                    <!-- Primary Navigation -->
                    <nav id="primary-nav">
                        <ul>
                            <li>
                                <a href="javascript:void(0)"
                                   :class="{ 'router-active': $route.name === 'dashboard' }"
                                   @click="go('dashboard')">
                                    <i class="fa fa-tachometer"></i>Dashboard
                                </a>
                            </li>
                            <li>
                                <a href="javascript:void(0)"
                                   :class="{ 'router-active': $route.name === 'sites' }"
                                   @click="go('sites')">
                                    <i class="fa fa-globe"></i>Sites
                                </a>
                            </li>
                            <li>
                                <a href="javascript:void(0)"
                                   :class="{ 'router-active': $route.name === 'queue' }"
                                   @click="go('queue')">
                                    <i class="fa fa-list-ol"></i>Queue Monitor
                                </a>
                            </li>
                        </ul>
                    </nav>
                    <!-- END Primary Navigation -->
                </aside>
                <!-- END Sidebar -->

                <!-- Page Content -->
                <div id="page-content">
                    <!-- Breadcrumb / nav-info -->
                    <ul id="nav-info" class="clearfix">
                        <li><a href="javascript:void(0)" @click="go('dashboard')"><i class="fa fa-home"></i></a></li>
                        <li class="active"><a href="">{{ pageTitle }}</a></li>
                    </ul>

                    <!-- Page heading -->
                    <h3 class="page-header page-header-top">
                        <i :class="pageIcon"></i> {{ pageTitle }}
                    </h3>

                    <!-- Router view -->
                    <router-view />
                </div>
                <!-- END Page Content -->

                <!-- Footer -->
                <footer>
                    <span id="year-copy">{{ new Date().getFullYear() }}</span>
                    &copy; <strong>Tenant Panel</strong>
                </footer>
                <!-- END Footer -->

            </div>
            <!-- END Inner Container -->
        </div>
        <!-- END Page Container -->
    </div>
    <!-- END Vue app root -->

    <!-- jQuery (Bootstrap 3 dependency) -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <!-- Bootstrap 3 JS -->
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/js/bootstrap.min.js"></script>
    <!-- Vue 2 -->
    <script src="https://unpkg.com/vue@2.7.14/dist/vue.min.js"></script>
    <!-- Vue Router 3 -->
    <script src="https://unpkg.com/vue-router@3.6.5/dist/vue-router.min.js"></script>
    <!-- Axios -->
    <script src="https://unpkg.com/axios@1.6.2/dist/axios.min.js"></script>

    <!-- App scripts -->
    <script src="/assets/js/api.js"></script>
    <script src="/assets/js/components/dashboard.js"></script>
    <script src="/assets/js/components/sites.js"></script>
    <script src="/assets/js/components/queue_monitor.js"></script>
    <script src="/assets/js/app.js"></script>
</body>
</html>
