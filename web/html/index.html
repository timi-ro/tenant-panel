<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RAG Admin Panel</title>
  <link rel="stylesheet" href="https://unpkg.com/ant-design-vue@1.7.8/dist/antd.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; }

    /* Layout */
    .layout { display: flex; min-height: 100vh; }

    /* Sidebar */
    .sidebar {
      width: 200px;
      min-width: 200px;
      background: #fff;
      border-right: 1px solid #e8e8e8;
      display: flex;
      flex-direction: column;
      transition: width 0.2s;
      position: fixed;
      top: 0; left: 0; bottom: 0;
      z-index: 100;
      overflow: hidden;
    }
    .sidebar.collapsed { width: 60px; min-width: 60px; }
    .sidebar-logo {
      height: 56px;
      display: flex;
      align-items: center;
      padding: 0 16px;
      border-bottom: 1px solid #e8e8e8;
      gap: 10px;
      overflow: hidden;
      white-space: nowrap;
    }
    .sidebar-logo-icon {
      width: 32px; height: 32px; min-width: 32px;
      background: #1890ff;
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-weight: 700; font-size: 16px;
    }
    .sidebar-logo-text { font-size: 15px; font-weight: 700; color: #262626; }
    .sidebar-nav { flex: 1; padding: 8px 0; overflow: hidden; }
    .nav-item {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 16px;
      cursor: pointer;
      color: #595959;
      font-size: 14px;
      white-space: nowrap;
      transition: background 0.15s, color 0.15s;
      border-left: 3px solid transparent;
    }
    .nav-item:hover { background: #f0f7ff; color: #1890ff; }
    .nav-item.active { background: #e6f4ff; color: #1890ff; border-left-color: #1890ff; font-weight: 600; }
    .nav-item .nav-icon { font-size: 16px; min-width: 20px; text-align: center; }
    .sidebar-footer {
      border-top: 1px solid #e8e8e8;
      padding: 8px 0;
    }
    .nav-item.logout:hover { background: #fff1f0; color: #f5222d; }

    /* Main */
    .main { margin-left: 200px; display: flex; flex-direction: column; min-height: 100vh; transition: margin-left 0.2s; }
    .main.collapsed { margin-left: 60px; }

    /* Header */
    .header {
      height: 56px;
      background: #fff;
      border-bottom: 1px solid #e8e8e8;
      display: flex; align-items: center;
      padding: 0 24px;
      gap: 12px;
      position: sticky; top: 0; z-index: 50;
    }
    .header-collapse-btn {
      cursor: pointer; color: #595959; font-size: 18px;
      transition: color 0.15s;
      background: none; border: none; padding: 4px;
    }
    .header-collapse-btn:hover { color: #1890ff; }
    .header-title { font-size: 15px; font-weight: 600; color: #262626; flex: 1; }
    .header-user { color: #8c8c8c; font-size: 13px; }

    /* Content */
    .content { flex: 1; padding: 24px; }

    /* Page header with stats bar (like x-ui) */
    .page-stats-bar {
      background: #fff;
      border: 1px solid #e8e8e8;
      border-radius: 6px;
      padding: 12px 20px;
      display: flex; align-items: center; gap: 24px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .stat-item { display: flex; align-items: center; gap: 6px; font-size: 13px; color: #595959; }
    .stat-value { font-weight: 600; color: #1890ff; }
    .stat-badge {
      display: inline-flex; align-items: center; justify-content: center;
      background: #f0f0f0; color: #595959;
      border-radius: 10px; padding: 1px 8px; font-size: 12px; font-weight: 600;
    }
    .stat-badge.blue { background: #e6f4ff; color: #1890ff; }
    .stat-badge.green { background: #f6ffed; color: #52c41a; }
    .stat-badge.orange { background: #fff7e6; color: #fa8c16; }
    .stat-badge.red { background: #fff1f0; color: #f5222d; }
    .stat-badge.purple { background: #f9f0ff; color: #722ed1; }

    /* Toolbar row */
    .toolbar {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }
    .toolbar-right { margin-left: auto; display: flex; gap: 8px; align-items: center; }

    /* Table card */
    .table-card {
      background: #fff;
      border: 1px solid #e8e8e8;
      border-radius: 6px;
      overflow: hidden;
    }

    /* Plan / status tags */
    .plan-tag {
      display: inline-block;
      padding: 1px 8px;
      border-radius: 10px;
      font-size: 12px;
      font-weight: 500;
    }
    .plan-free     { background: #f5f5f5;   color: #595959; border: 1px solid #d9d9d9; }
    .plan-pro      { background: #e6f4ff;   color: #1890ff; border: 1px solid #91caff; }
    .plan-gold     { background: #fffbe6;   color: #d48806; border: 1px solid #ffe58f; }
    .plan-enterprise { background: #f9f0ff; color: #722ed1; border: 1px solid #d3adf7; }

    .status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 5px; }
    .dot-green { background: #52c41a; }
    .dot-gray  { background: #bfbfbf; }

    /* Action icon buttons */
    .action-btn {
      display: inline-flex; align-items: center; justify-content: center;
      width: 28px; height: 28px; border-radius: 4px;
      border: 1px solid #d9d9d9; background: #fff;
      cursor: pointer; color: #595959; font-size: 13px;
      transition: all 0.15s;
    }
    .action-btn:hover { border-color: #1890ff; color: #1890ff; background: #e6f4ff; }
    .action-btn.danger:hover { border-color: #f5222d; color: #f5222d; background: #fff1f0; }

    /* Progress bar */
    .mini-progress { height: 4px; background: #f0f0f0; border-radius: 2px; margin-top: 4px; overflow: hidden; }
    .mini-progress-bar { height: 100%; border-radius: 2px; background: #1890ff; transition: width 0.3s; }
    .mini-progress-bar.warn { background: #fa8c16; }

    /* Footer */
    .footer { padding: 16px 24px; text-align: center; color: #bfbfbf; font-size: 12px; border-top: 1px solid #f0f0f0; }
  </style>
</head>
<body>
<div id="app">
  <div class="layout">
    <!-- Sidebar -->
    <div class="sidebar" :class="{ collapsed }">
      <div class="sidebar-logo">
        <div class="sidebar-logo-icon">R</div>
        <span class="sidebar-logo-text" v-show="!collapsed">RAG Panel</span>
      </div>
      <nav class="sidebar-nav">
        <div class="nav-item" :class="{ active: $route.name === 'dashboard' }" @click="go('dashboard')">
          <span class="nav-icon"><a-icon type="dashboard" /></span>
          <span v-show="!collapsed">Dashboard</span>
        </div>
        <div class="nav-item" :class="{ active: $route.name === 'sites' }" @click="go('sites')">
          <span class="nav-icon"><a-icon type="global" /></span>
          <span v-show="!collapsed">Sites</span>
        </div>
        <div class="nav-item" :class="{ active: $route.name === 'queue' }" @click="go('queue')">
          <span class="nav-icon"><a-icon type="ordered-list" /></span>
          <span v-show="!collapsed">Queue Monitor</span>
        </div>
      </nav>
      <div class="sidebar-footer">
        <div class="nav-item logout" @click="logout">
          <span class="nav-icon"><a-icon type="logout" /></span>
          <span v-show="!collapsed">Sign Out</span>
        </div>
      </div>
    </div>

    <!-- Main -->
    <div class="main" :class="{ collapsed }">
      <div class="header">
        <button class="header-collapse-btn" @click="collapsed = !collapsed">
          <a-icon :type="collapsed ? 'menu-unfold' : 'menu-fold'" />
        </button>
        <span class="header-title">{{ pageTitle }}</span>
        <span class="header-user"><a-icon type="user" /> Admin</span>
      </div>
      <div class="content">
        <router-view />
      </div>
      <div class="footer">RAG Admin Panel &copy; {{ new Date().getFullYear() }}</div>
    </div>
  </div>
</div>

<script src="https://unpkg.com/vue@2.7.14/dist/vue.min.js"></script>
<script src="https://unpkg.com/vue-router@3.6.5/dist/vue-router.min.js"></script>
<script src="https://unpkg.com/ant-design-vue@1.7.8/dist/antd.min.js"></script>
<script src="https://unpkg.com/axios@1.6.2/dist/axios.min.js"></script>
<script src="/assets/js/api.js"></script>
<script src="/assets/js/components/dashboard.js"></script>
<script src="/assets/js/components/sites.js"></script>
<script src="/assets/js/components/queue_monitor.js"></script>
<script src="/assets/js/app.js"></script>
</body>
</html>
