<!DOCTYPE html>
<html class="no-js" lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Tenant Panel &mdash; Login</title>

    <!-- Bootstrap 3 -->
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <!-- uAdmin CSS -->
    <link rel="stylesheet" href="/assets/css/plugins.css">
    <link rel="stylesheet" href="/assets/css/main.css">
</head>
<body class="login">
    <!-- Login Container -->
    <div id="login-container">
        <div id="login-logo">
            <h3 style="color:#333;font-weight:700;margin:0 0 4px;">Tenant Panel</h3>
            <p style="color:#999;font-size:13px;margin:0;">Sign in to manage your deployment</p>
        </div>

        <!-- Error message -->
        <div id="error-msg" class="alert alert-danger" style="display:none;margin-top:14px;">
            <i class="fa fa-exclamation-triangle"></i> Invalid password. Please try again.
        </div>

        <!-- Login Form -->
        <form id="login-form" action="/login" method="POST" class="form-horizontal" style="display:block;padding-top:18px;">
            <div class="form-group">
                <div class="col-xs-12">
                    <div class="input-group">
                        <input type="password" id="password" name="password" placeholder="Password.." class="form-control" autofocus>
                        <span class="input-group-addon"><i class="fa fa-lock fa-fw"></i></span>
                    </div>
                </div>
            </div>
            <div class="clearfix">
                <div class="btn-group btn-group-sm pull-right">
                    <button type="submit" class="btn btn-success"><i class="fa fa-arrow-right"></i> Sign In</button>
                </div>
            </div>
        </form>
        <!-- END Login Form -->
    </div>
    <!-- END Login Container -->

    <script>
        if (new URLSearchParams(window.location.search).get('error') === '1') {
            document.getElementById('error-msg').style.display = 'block';
        }
    </script>
</body>
</html>
